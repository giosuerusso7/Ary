<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Nostro Spazio ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcedf2; /* Sfondo rosa/crema soft */
            color: #4a4a4a;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: white;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        header h1 {
            margin: 0;
            color: #d81b60;
            font-size: 2.5rem;
        }

        header p {
            font-style: italic;
            color: #777;
            margin-top: 10px;
        }

        .container {
            max-width: 1000px;
            width: 95%;
            margin: 30px auto;
            text-align: center;
        }

        h2 {
            color: #d81b60;
            border-bottom: 2px solid #f48fb1;
            padding-bottom: 8px;
            margin-top: 20px;
            text-align: left;
            font-size: 1.5rem;
        }

        /* Contenitore reattivo per la galleria incorporata */
        .drive-gallery-container {
            width: 100%;
            height: 650px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            background: white;
            margin-top: 20px;
        }

        .drive-embed {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Il Nostro Posto Speciale 🤍</h1>
        <p>I nostri ricordi, protetti in un angolo di web tutto nostro. Sincronizzato in tempo reale.</p>
    </header>

    <div class="container">

        <h2>La Nostra Galleria di Foto e Video 📸 ✨</h2>
        
        <div class="drive-gallery-container">
            <iframe src="https://drive.google.com/embeddedfolderview?id=1hNs9u4TS4IkxRo2a8R86igsr92o13LY2#grid" class="drive-embed" allow="autoplay"></iframe>
        </div>

    </div>

    <footer>
        <p>Creato con il cuore. Trascina le foto su Drive per vederle qui. ✨</p>
    </footer>

</body>
</html>
